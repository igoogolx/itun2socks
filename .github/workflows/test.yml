name: Test
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.3'
          cache: true
      - name: Install dependencies
        run: go mod tidy
      - name: Generate
        run: go generate
      - name: Test with the Go CLI
        run: go test ./...
